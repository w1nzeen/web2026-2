<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="/style.css">
  </head>
<body>
  <div class="container">
    <h1>Inventory Search</h1>

    <form id="search-form">
      <label>ID:</label>
      <input type="text" name="id" id="search-id" required>

      <div class="checkbox">
        <input type="checkbox" name="has_photo" id="has_photo">
        <label for="has_photo">Include photo in description</label>
      </div>

      <button type="submit">Search</button>
    </form>

    <div id="result" class="result hidden"></div>
  </div>

  <script>
    document.getElementById('search-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const id = document.getElementById('search-id').value.trim();
      const has_photo = document.getElementById('has_photo').checked;
      const resultEl = document.getElementById('result');

      resultEl.className = 'result hidden';
      resultEl.innerHTML = '';

      try {
        const res = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ id, has_photo: has_photo ? 'on' : '' })
        });

        if (res.status === 404) {
          resultEl.className = 'result result--error';
          resultEl.innerHTML = '<span class="result-label">Not found</span><p>No item with ID ' + id + '.</p>';
          return;
        }

        const data = await res.json();

        const cleanDesc = data.description.replace(/\s*Photo:\s*https?:\/\/\S+/g, '').trim();

        let html = `
          <div class="result-row">
            <span class="result-label">ID</span>
            <span class="result-value">${data.id}</span>
          </div>
          <div class="result-row">
            <span class="result-label">Name</span>
            <span class="result-value">${data.inventory_name}</span>
          </div>`;

        if (cleanDesc) {
          html += `
          <div class="result-row">
            <span class="result-label">Description</span>
            <span class="result-value">${cleanDesc}</span>
          </div>`;
        }

        if (has_photo) {
          html += `
          <div class="result-row result-row--photo">
            <span class="result-label">Photo</span>
            <img class="result-photo" src="/inventory/${data.id}/photo" alt="${data.inventory_name}"
                 onerror="this.parentElement.querySelector('.result-label').after(Object.assign(document.createElement('span'),{className:'result-value result-value--muted',textContent:'No photo available'})); this.remove();">
          </div>`;
        }

        resultEl.className = 'result result--success';
        resultEl.innerHTML = html;

      } catch (err) {
        resultEl.className = 'result result--error';
        resultEl.innerHTML = '<span class="result-label">Error</span><p>Something went wrong.</p>';
      }
    });
  </script>
</body>
</html>
